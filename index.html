<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>THIS WEB DOES NOT COMPLY</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-stage="0">

<!-- ═══ LOADER — original strip loader, lime flash, fast transition ═══ -->
<div id="loader">
  <div id="ld-strip">
    <img src="loadingpage_background_1.jpg" alt="">
    <img src="loadingpage_background_3.jpg" alt="">
    <img src="loadingpage_background_2.jpg" alt="">
    <img src="loadingpage_background_1.jpg" alt="">
    <img src="loadingpage_background_3.jpg" alt="">
    <img src="loadingpage_background_2.jpg" alt="">
    <img src="loadingpage_background_1.jpg" alt="">
    <img src="loadingpage_background_3.jpg" alt="">
    <img src="loadingpage_background_2.jpg" alt="">
  </div>
  <img id="ld-logo" src="This_Web_Does_Not_Comply_logo.png" alt="">
  <div id="ld-lime"></div>
  <div id="ld-pct">0%</div>
</div>

<!-- ═══ TOP BAR ═══ -->
<header id="bar" class="hide">
  <span class="bar-title">THIS WEB DOES NOT COMPLY</span>
  <span class="bar-sep">—</span>
  <span class="cw" data-stage="1">SCROLLING</span>
  <span class="bc">·</span>
  <span class="cw" data-stage="2">SELECTION</span>
  <span class="bc">·</span>
  <span class="cw" data-stage="3">READABILITY</span>
  <span class="bc">·</span>
  <span class="cw" data-stage="4">NAVIGATION</span>
  <span class="bc">·</span>
  <span class="cw" data-stage="5">EXIT</span>
</header>

<!-- ═══ LOCK INDICATOR — hidden; canvas drawUI handles display ═══ -->
<div id="lock-ind" class="hide">
  <span id="lock-label">LOCKED</span>
  <div id="lock-bar"><div id="lock-fill"></div></div>
  <span id="lock-time">15s</span>
</div>

<!-- ═══ YOU FAILED ═══ -->
<div id="failed-msg" class="hide">
  <span id="failed-inner">YOU FAILED</span>
</div>

<!-- ═══ SCROLL CONTAINER ═══ -->
<div id="sc" class="hide">
  <div id="tall">
    <!-- Stages injected by JS (exit at top, scrolling near bottom) -->
    <div id="dyn"></div>

    <!-- GAME SECTION -->
    <section id="s-game" class="game-sec">
      <canvas id="cv-game" class="full-cv"></canvas>
    </section>

    <!-- LANDING PAGE — original main page -->
    <section id="s-theme" class="theme-sec">
      <img src="The_main_page.jpg" class="sec-bg" alt="">
    </section>

    <!-- BOTTOM — unchanged -->
    <section id="s-bottom" class="bottom-sec">
      <img src="Main_bottom.jpg" class="sec-bg" alt="">
      <img src="Main_bottom_error.jpg" class="sec-bg bottom-err" alt="">
    </section>
  </div>
</div>

<!-- ═══ MAGNIFIER CURSOR ═══ -->
<div id="mag"><div id="mag-ring"></div></div>

<script src="script.js"></script>
</body>
</html>
